<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/statistics.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.13/css/all.css"
    integrity="sha384-DNOHZ68U8hZfKXOrtjWvjxusGo9WQnrNx2sqG0tfsghAvtVlRW3tvkXWZh58N9jp" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <title>Olivier Leplus — Stats</title>
</head>

<body>
  <div class="orbs">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <header class="topbar">
    <span class="topbar__brand">stats<span class="topbar__dot">.</span></span>
    <nav class="topbar__nav">
      <a href="/">Talks</a>
      <a href="/videos.html">Videos</a>
      <a href="https://www.linkedin.com/in/olivierleplus/" target="_blank">LinkedIn ↗</a>
    </nav>
  </header>

  <main class="dashboard">
    <section class="kpi-row" id="summary-cards"></section>

    <section class="glass-panel filter-bar">
      <div class="filter">
        <label for="filter-year">Year</label>
        <select id="filter-year"><option value="all">All</option></select>
      </div>
      <div class="filter">
        <span class="filter__label">Roles</span>
        <div class="filter__roles" id="filter-roles"></div>
      </div>
      <button type="button" id="filter-reset" class="btn-reset">Reset</button>
    </section>

    <section class="chart-grid">
      <div class="glass-panel chart-card chart-card--wide">
        <h3 class="chart-card__title">Talks per year</h3>
        <div class="chart-card__canvas"><canvas id="chart-conf-year"></canvas></div>
      </div>
      <div class="glass-panel chart-card">
        <h3 class="chart-card__title">By country</h3>
        <div class="chart-card__canvas"><canvas id="chart-conf-country"></canvas></div>
      </div>
      <div class="glass-panel chart-card">
        <h3 class="chart-card__title">Roles</h3>
        <div class="chart-card__canvas"><canvas id="chart-roles"></canvas></div>
      </div>
      <div class="glass-panel chart-card chart-card--wide">
        <h3 class="chart-card__title">Activity timeline</h3>
        <div class="chart-card__canvas"><canvas id="chart-timeline"></canvas></div>
      </div>
      <div class="glass-panel chart-card">
        <h3 class="chart-card__title">Videos per year</h3>
        <div class="chart-card__canvas"><canvas id="chart-vid-year"></canvas></div>
      </div>
      <div class="glass-panel chart-card">
        <h3 class="chart-card__title">Videos by event</h3>
        <div class="chart-card__canvas"><canvas id="chart-vid-event"></canvas></div>
      </div>
    </section>
  </main>

  <script type="text/javascript" src="assets/statistics.js"></script>
</body>

</html>
